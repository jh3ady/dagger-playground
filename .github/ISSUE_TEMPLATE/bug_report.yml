name: Bug report
description: Something in this repo's experiments or CI does not behave as documented.
title: "[bug] "
labels: ["type:bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please fill in the sections below so the issue is reproducible.
  - type: dropdown
    id: sdk
    attributes:
      label: SDK concerned
      options:
        - Go
        - TypeScript
        - Python
        - Multiple / repo-level
    validations:
      required: true
  - type: input
    id: experiment
    attributes:
      label: Experiment
      description: e.g. `01-matrix-pg-compat`
      placeholder: "01-matrix-pg-compat"
    validations:
      required: true
  - type: input
    id: dagger_version
    attributes:
      label: Dagger CLI version
      description: Output of `dagger version`
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Host OS
      description: e.g. `macOS 15 arm64`, `Ubuntu 24.04 amd64`
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Exact commands you ran.
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior / output
      render: shell
    validations:
      required: true
