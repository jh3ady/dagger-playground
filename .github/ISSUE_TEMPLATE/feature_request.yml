name: Feature request
description: Suggest an improvement to an existing experiment or repo-level tooling.
title: "[feat] "
labels: ["type:feature"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem this would solve
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
