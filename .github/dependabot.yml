version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: "gomod"
    directory: "/experiments/01-matrix-pg-compat/go"
    schedule:
      interval: "monthly"
    groups:
      go-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm"
    directory: "/experiments/01-matrix-pg-compat/ts"
    schedule:
      interval: "monthly"
    groups:
      npm-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "pip"
    directory: "/experiments/01-matrix-pg-compat/python"
    schedule:
      interval: "monthly"
    groups:
      pip-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
