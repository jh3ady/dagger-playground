name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  matrix-pg-compat:
    name: matrix-pg-compat (${{ matrix.sdk }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sdk: [go, ts, python]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run test-matrix (${{ matrix.sdk }})
        uses: dagger/dagger-for-github@v8.4.1
        with:
          call: test-matrix
          module: experiments/01-matrix-pg-compat/${{ matrix.sdk }}
          version: "0.20.6"
