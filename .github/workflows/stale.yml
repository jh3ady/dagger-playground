name: Close stale issues and PRs

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-issue-stale: 60
          days-before-issue-close: 14
          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          stale-issue-message: "This issue has been inactive for 60 days. It will be closed in 14 days if no further activity."
          stale-pr-message: "This PR has been inactive for 30 days. It will be closed in 14 days if no further activity."
          exempt-issue-labels: "pinned,security,type:experiment"
          exempt-pr-labels: "pinned,security"
